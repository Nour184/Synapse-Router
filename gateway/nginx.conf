error_log /var/log/nginx/error.log debug;  #route te errors into the error log folder for debugging purposes

events {
    worker_connections 1024;
}

http {

    resolver 127.0.0.11 ipv6=off;
    #for logging the requests
    log_format tracking_log '[$time_local] REQ_ID: $http_x_request_id | ROUTED_TO: $upstream_addr | STATUS: $status | TIME: ${upstream_response_time}s';
    access_log /var/log/nginx/access.log tracking_log;

    # add 1MB of shared memory for the lua script to store the state of the worker nodes
    lua_shared_dict router_state 1m; 
    #tell NGINX where to find the Redis library and the lua script 
    lua_package_path "/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lua/?.lua;;";
   
    # the upstream block is where we define the worker nodes and the load balancing strategy. The balancer_by_lua_file directive tells NGINX to use the Lua script to determine which worker node to route the request to.
    upstream ai_workers {
        #dummy ip required by NGINX syntax..lua will instantly overwrite this.
        server 0.0.0.1:80; 
        
        #routing is written in this lua script
        balancer_by_lua_file /usr/local/openresty/lua/router.lua;
    }

    server {
        client_body_buffer_size 2M;
        listen 80;
        location /api/ {          
            access_by_lua_file /usr/local/openresty/lua/access.lua;  
            
            proxy_connect_timeout 10s;  
            proxy_send_timeout 300s;    
            proxy_read_timeout 300s;    

            proxy_pass http://ai_workers;    
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;

            # --- ADD THIS BLOCK FOR CLEANUP ---
            log_by_lua_block {
                if ngx.ctx.req_id then
                    -- 1. Delete from Nginx Shared Memory (Instant)
                    local state = ngx.shared.router_state
                    state:delete("tracking_" .. ngx.ctx.req_id)

                    -- 2. Define the background task for Redis deletion
                    local function cleanup_redis(premature, req_id)
                        if premature then return end
                        
                        local redis = require "resty.redis"
                        local red = redis:new()
                        red:set_timeout(1000) 
                        
                        local ok, err = red:connect("redis", 6379) 
                        if ok then 
                            red:hdel("requests:payloads", req_id) 
                            red:set_keepalive(10000, 100) 
                        else 
                            ngx.log(ngx.ERR, "Failed to connect to Redis for cleanup: ", err) 
                        end
                    end

                    -- 3. Spawn the background thread with 0 delay
                    local ok, err = ngx.timer.at(0, cleanup_redis, ngx.ctx.req_id)
                    if not ok then
                        ngx.log(ngx.ERR, "Failed to create Redis cleanup timer: ", err)
                    end
                end
            }
        }


        location /watchdog/state {
            access_log off; #silence tihs b*&t%ch
            default_type application/json;
            content_by_lua_block {
                local cjson = require "cjson"
                local state = ngx.shared.router_state
                local keys = state:get_keys(1024)
                
                -- Create separate tables for tracking and bans
                local response = { tracking = {}, banned = {} }
                
                for _, key in ipairs(keys) do 
                    if string.sub(key, 1, 9) == "tracking_" then 
                        local req_id = string.sub(key, 10)
                        response.tracking[req_id] = state:get(key)
                    elseif string.sub(key, 1, 7) == "banned_" then
                        table.insert(response.banned, string.sub(key, 8))
                    end 
                end
                
                ngx.say(cjson.encode(response))
            }
        }

        location /watchdog/control {
            content_by_lua_block {
                ngx.req.read_body()
                local args, err = ngx.req.get_post_args()
                local state = ngx.shared.router_state
                
                if args and args.ban_node then
                    state:set("banned_" .. args.ban_node, true, 300)
                    ngx.say("Node " .. args.ban_node .. " has been banned.")
                elseif args and args.clear_req then
                    state:delete("tracking_" .. args.clear_req)
                    ngx.say("Request " .. args.clear_req .. " cleared from tracking.")
                else
                    ngx.status = 400
                    ngx.say("Invalid command")
                end
            }
        }
    }
}
