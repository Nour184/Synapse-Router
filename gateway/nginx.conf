error_log /var/log/nginx/error.log debug;  #route te errors into the error log folder for debugging purposes

events {
    worker_connections 1024;
}

http {

    resolver 127.0.0.11 ipv6=off;
    #tell NGINX where to find the Redis library
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";

    # ip's assigned to the Load Balancer
    upstream internal_router {
        server 127.0.0.1:8001; #hardwired to woker node 1
        server 127.0.0.1:8002; #hardwired to worker node 2 
    }

    server {
        listen 80;
        location /api/ {          #route to http://localhost:80/api/...
            access_by_lua_block {
                ngx.req.read_body()
                local req_id = "req-" .. tostring(ngx.time()) .. "-" .. math.random(1000, 9999)
                ngx.req.set_header("X-Request-ID", req_id)
            }
            proxy_pass http://internal_router;    #route to the internal router (upstream module) which load balances to the workers
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }


    # --------------------------DUMMY secondary nginx server Hardwired to Worker 1-----------------------
    server {
        listen 8001;
        location / {
            access_by_lua_block {
                local req_id = ngx.req.get_headers()["X-Request-ID"]  --get the request id of this request from the headers
                
                -- get the actual payload body the user sent
                ngx.req.read_body()
                local body_data = ngx.req.get_body_data() or "{}"

                local redis = require "resty.redis" -- use OpenResty redis library to connect to Redis and save the request details
                local red = redis:new()
                red:set_timeouts(1000, 1000, 1000)   --timeout 1 second for connecting, sending, and receiving to/from redis
                
                local ok, err = red:connect("redis", 6379) --connect to redis container on pport 6379
                if ok then
                    -- Save exactly which node this is going to, with the payload..the prompt itself
                    local json_data = '{"request_id":"' .. req_id .. '", "node":"worker-1", "payload":' .. body_data .. '}'
                    red:hset("requests:worker-1", req_id, json_data)
                    
                    red:set_keepalive(10000, 100) --keep the connection with redis alive for 10 secs and allow up to 100 simultaneous connection to redis
                else
                    ngx.log(ngx.ERR, "Failed to connect to Redis: ", err)
                end
            }

            # ROUTE TO node IP -> PORT 8001
            #proxy_pass http://100.x.x.1:8001;  #should change this when we have the actual IP of worker 1, but for testing we can just route to localhost:8001 which is this dummy server that is hardwired to worker 1
            proxy_pass http://worker:8000;
        }
    }


    # ----------------------------DUMMY secondary nginx server 2 - Hardwired to Worker 2--------------------------

    server {
        listen 8002;
        location / {
            access_by_lua_block {
                local req_id = ngx.req.get_headers()["X-Request-ID"]
                
                ngx.req.read_body()
                local body_data = ngx.req.get_body_data() or "{}"

                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeouts(1000, 1000, 1000)
                
                local ok, err = red:connect("redis", 6379)
                if ok then
                    local json_data = '{"request_id":"' .. req_id .. '", "node":"worker-2", "payload":' .. body_data .. '}'
                    red:hset("requests:worker-2", req_id, json_data)
                    
                    red:set_keepalive(10000, 100)
                else
                    ngx.log(ngx.ERR, "Failed to connect to Redis: ", err)
                end
            }

            # ROUTE TO SAME MATE'S IP -> PORT 8002
            #proxy_pass http://100.x.x.1:8002;  #should change this when we have the actual IP of worker 2, but for testing we can just route to localhost:8002 which is this dummy server that is hardwired to worker 2
            proxy_pass http://worker-2:8000;    
        }
    }
}
