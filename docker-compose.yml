version: '3.8'

services:

  gateway:
    build: ./gateway  #build the Dockerfile inside the gateway folder
    profiles: ["control"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
    - ./gateway/logs:/var/log/nginx  # Save logs here so i can use it in debugging
    - ./gateway/lua:/usr/local/openresty/lua/ # Copy the Lua scripts to the container
    ports:
    - "80:80"
    depends_on:
    - redis
    networks:
    - synaptic-network
  
  redis:
    image: "redis:latest"
    profiles: ["control"]
    ports:
    - "6379:6379"
    networks:
    - synaptic-network
  
  # worker:
  #   build: ./working-nodes  #build the Dockerfile inside the working-nodes folder
  #   profiles: ["compute"]
  #   environment:
  #     - OLLAMA_HOST=ollama   # Tell Python where to find the AI model
  #   ports:
  #     - "5002:5000" # Expose a range of ports for multiple worker instances
  #   #depends_on:
  #   #  - ollama  
  #   networks:
  #     - synaptic-network

  worker-1:
    build: ./working-nodes
    profiles: ["compute"]
    ports:
      - "5000:5000"
      #   #depends_on:
      #  - ollama  
    networks:
      - synaptic-network

  worker-2:
    build: ./working-nodes
    profiles: ["compute"]
    ports:
      - "5001:5000"
      #   #depends_on:
      #  - ollama  
    networks:
      - synaptic-network

  worker-3:
    build: ./working-nodes
    profiles: ["compute"]
    ports:
      - "5002:5000"
      #   #depends_on:
      #  - ollama  
    networks:
      - synaptic-network
    
  ollama:
    image: "ollama/ollama:latest"
    profiles: ["compute"]
    volumes: 
      - ./ollama_data:/root/.ollama # Save models here so they don't delete on restart
    networks:
      - synaptic-network

  watchdog:
    build: ./watchdog  #build the Dockerfile inside the gateway/watchdog folder
    profiles: ["control"]
    environment:
      - REDIS_HOST=redis     # Tell Python where to find the database
    depends_on:
      - redis
    networks:
      - synaptic-network


networks:
  synaptic-network:
    driver: bridge     # Creates a private virtual Wi-Fi for containers